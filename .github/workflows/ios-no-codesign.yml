name: iOS Unsigned IPA (LiveContainer)

# This workflow builds an unsigned IPA by manually packaging the unsigned Runner.app.
# Intended for LiveContainer-style import/testing workflows, not normal signed iOS distribution.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ios-no-codesign.yml'
      - 'ios/**'
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ios-no-codesign.yml'
      - 'ios/**'
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'

jobs:
  build-ios-no-codesign:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.0

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Build unsigned .app
        run: |
          flutter build ios --release --no-codesign || \
          (echo "Fallback: flutter build failed due to signing check, using xcodebuild directly" && \
           cd ios && \
           xcodebuild -workspace Runner.xcworkspace -scheme Runner -sdk iphoneos \
             -configuration Release-iphoneos \
             CODE_SIGNING_ALLOWED=NO \
             DEVELOPMENT_TEAM="" \
             COMPILER_INDEX_STORE_ENABLE=NO \
             build)

      - name: Package unsigned IPA for LiveContainer
        run: |
          cd build/ios/Release-iphoneos
          rm -rf Payload Runner.ipa
          mkdir -p Payload
          cp -R Runner.app Payload/
          /usr/bin/zip -qry Runner.ipa Payload
          rm -rf Payload

      - name: Upload unsigned IPA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-wrong-notebook-ios-unsigned-ipa
          path: |
            build/ios/Release-iphoneos/Runner.ipa
            build/ios/Release-iphoneos/Runner.app
          if-no-files-found: error
          retention-days: 30
