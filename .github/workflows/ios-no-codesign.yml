name: iOS No Codesign Archive

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ios-no-codesign.yml'
      - 'ios/**'
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ios-no-codesign.yml'
      - 'ios/**'
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'

jobs:
  build-ios-no-codesign:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.0

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Build release archive without codesign
        run: flutter build ipa --release --no-codesign

      - name: Build experimental LiveContainer candidate IPA
        run: |
          rm -rf build/ios/livecontainer-candidate
          mkdir -p build/ios/livecontainer-candidate/Payload
          cp -R build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build/ios/livecontainer-candidate/Payload/
          cd build/ios/livecontainer-candidate
          /usr/bin/zip -qry ../ai-wrong-notebook-livecontainer-candidate.ipa Payload

      - name: Upload no-codesign archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-wrong-notebook-ios-no-codesign-archive
          path: |
            build/ios/ai-wrong-notebook-livecontainer-candidate.ipa
            build/ios/archive/*.xcarchive
          if-no-files-found: error
          retention-days: 30
