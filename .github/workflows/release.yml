name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.0

      - run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release bundle
        run: flutter build appbundle --release

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
          gh release create "${{ github.ref_name }}" --title "AI错题本 ${{ github.ref_name }}" --notes "Automated release for ${{ github.ref_name }}"

      - name: Upload APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            build/app/outputs/flutter-apk/app-release.apk#ai-wrong-notebook-${{ github.ref_name }}.apk \
            --clobber

      - name: Upload AAB
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            build/app/outputs/bundle/release/app-release.aab#ai-wrong-notebook-${{ github.ref_name }}.aab \
            --clobber

  build-ios-no-codesign:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.0

      - name: Install CocoaPods dependencies
        run: |
          flutter pub get
          cd ios
          pod install

      - name: Build release IPA without codesign
        run: flutter build ipa --release --no-codesign

      - name: Upload IPA to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            build/ios/ipa/*.ipa#ai-wrong-notebook-${{ github.ref_name }}-ios-no-codesign.ipa \
            --clobber
